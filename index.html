<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>微信精选对话版</title>
  <style>
    :root{--bg:#ededed;--surface:#f7f7f7;--card:#fff;--line:#e5e5e5;--text:#111;--sub:#888;--brand:#07c160;--danger:#fa5151;--bubble:#95ec69;--font-scale:1}
    *{box-sizing:border-box;margin:0;padding:0} html,body{height:100%}
    body{background:#d8d8d8;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;font-size:calc(14px*var(--font-scale));overflow:hidden}
    .app{max-width:540px;height:100vh;height:100dvh;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;position:relative}
    .safe-top{height:env(safe-area-inset-top,0px);min-height:8px;background:var(--surface)} .safe-bottom{height:env(safe-area-inset-bottom,0px)}
    .page{display:none;flex:1;min-height:0;flex-direction:column}.page.active{display:flex}
    .header{height:44px;background:var(--surface);border-bottom:1px solid #d8d8d8;display:flex;align-items:center;justify-content:space-between;padding:0 12px;position:relative}
    .header h1{position:absolute;left:50%;transform:translateX(-50%);font-size:17px;white-space:nowrap}
    .icon-btn{border:0;background:transparent;font-size:20px;cursor:pointer}
    .content{flex:1;min-height:0;overflow:auto;background:var(--card)}
    .search{padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--line)} .search-box{background:#fff;border-radius:8px;padding:8px 10px;display:flex;gap:6px;color:var(--sub)} .search-box input{border:0;outline:none;width:100%}
    .list{list-style:none}.item,.entry{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line);background:#fff;cursor:pointer}.item:active,.entry:active{background:#f3f3f3}
    .avatar{width:48px;height:48px;border-radius:10px;margin-right:10px;overflow:hidden;flex-shrink:0;background:#f2f2f2}.avatar img{width:100%;height:100%}
    .meta{flex:1;overflow:hidden}.row{display:flex;justify-content:space-between;gap:8px;margin-bottom:4px}.name{font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.time{font-size:11px;color:var(--sub)}.preview{font-size:13px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .badge{min-width:18px;height:18px;border-radius:9px;background:var(--danger);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0 6px}
    .tabbar{height:50px;background:var(--surface);border-top:1px solid #d8d8d8;display:flex}.tab{flex:1;border:0;background:transparent;color:#7f8389;font-size:10px;display:flex;flex-direction:column;justify-content:center;align-items:center}.tab.active{color:var(--brand)}
    .overlay{position:absolute;inset:0;background:var(--bg);z-index:10;transform:translateX(100%);transition:.22s;display:flex;flex-direction:column;min-height:0}.overlay.active{transform:translateX(0)}
    .msgs{flex:1;min-height:0;overflow:auto;padding:12px}
    .msg{display:flex;gap:8px;margin-bottom:12px;align-items:flex-start}.msg.me{justify-content:flex-end}.msg.col{flex-direction:column;align-items:flex-start}
    .sender{font-size:12px;color:#666;margin-left:44px;margin-bottom:4px}
    .bubble{max-width:74%;background:#fff;border-radius:8px;padding:9px 11px;line-height:1.45;word-break:break-word}.msg.me .bubble{background:var(--bubble)}
    .composer{display:flex;gap:8px;background:var(--surface);padding:7px;border-top:1px solid #d8d8d8}.composer input{flex:1;border:0;outline:none;border-radius:7px;padding:10px}.send{border:0;border-radius:7px;padding:0 14px;background:var(--brand);color:#fff}
    .panel{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin:10px}.setting-row{display:flex;gap:8px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line)}.setting-row:last-child{border-bottom:0}
    .setting-row label{min-width:92px;font-size:13px;color:#555}.setting-row input,.setting-row select,.setting-row textarea{width:100%;border:1px solid #ddd;border-radius:7px;padding:8px;font-size:13px;outline:none}.setting-row textarea{min-height:78px;resize:vertical}
    .switch{width:42px;height:24px;border-radius:12px;background:#ccc;position:relative;cursor:pointer}.switch:after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;left:2px;top:2px;transition:.2s}.switch.on{background:var(--brand)}.switch.on:after{left:20px}
    .actions{display:flex;flex-wrap:wrap;gap:8px;padding:0 10px 10px}.btn{border:0;border-radius:8px;padding:10px 12px;background:#ececec}.btn.primary{background:var(--brand);color:#fff}.btn.warn{background:#ffe8e8;color:#ca3c3c}
    .tiny{font-size:12px;color:#888;padding:0 12px 12px;line-height:1.5}.toast{position:absolute;left:50%;bottom:90px;transform:translateX(-50%);padding:8px 14px;background:rgba(0,0,0,.78);color:#fff;border-radius:999px;font-size:12px;opacity:0;transition:.2s;pointer-events:none;z-index:30}.toast.show{opacity:1}
  </style>
</head>
<body>
<div class="app">
  <div class="safe-top"></div>
  <section class="page active" id="page-chats">
    <header class="header"><button id="new-chat-btn" class="icon-btn">＋</button><h1>微信 (<span id="unread-total">0</span>)</h1><button class="icon-btn" id="open-settings-top">⚙️</button></header>
    <div class="search"><div class="search-box">🔍<input id="chat-search" placeholder="搜索聊天"></div></div>
    <main class="content"><ul class="list" id="chat-list"></ul></main>
  </section>
  <section class="page" id="page-contacts"><header class="header"><h1>通讯录</h1><span></span></header><main class="content"><div class="entry" data-action="members"><span style="margin-right:10px">👨‍👩‍👧‍👦</span><span>群成员关系图</span></div></main></section>
  <section class="page" id="page-discover"><header class="header"><h1>发现</h1><span></span></header><main class="content"><div class="entry" data-action="tips"><span style="margin-right:10px">💡</span><span>聊天系统说明</span></div></main></section>
  <section class="page" id="page-me"><header class="header"><h1>我</h1><span></span></header><main class="content"><div class="entry" id="open-settings"><span style="margin-right:10px">⚙️</span><span>设置（DeepSeek API）</span></div></main></section>
  <nav class="tabbar" id="tabbar"><button class="tab active" data-page="chats">💬<span>微信</span></button><button class="tab" data-page="contacts">👥<span>通讯录</span></button><button class="tab" data-page="discover">✨<span>发现</span></button><button class="tab" data-page="me">🙂<span>我</span></button></nav>
  <div class="safe-bottom"></div>

  <section class="overlay" id="chat-overlay">
    <header class="header"><button class="icon-btn" id="chat-back">‹</button><h1 id="chat-title">聊天</h1><button class="icon-btn" id="chat-menu">@</button></header>
    <main class="msgs" id="message-list"></main>
    <footer class="composer"><input id="msg-input" placeholder="发消息，群聊可 @妈妈 / @哥哥" maxlength="1500"><button class="send" id="send-btn">发送</button></footer>
  </section>

  <section class="overlay" id="settings-overlay">
    <header class="header"><button class="icon-btn" id="settings-back">‹</button><h1>API 设置中心</h1><span></span></header>
    <main class="content">
      <div class="panel">
        <div class="setting-row"><label>提供商</label><select id="provider"><option value="deepseek">DeepSeek</option><option value="openai">OpenAI</option><option value="custom">Custom</option></select></div>
        <div class="setting-row"><label>API 模式</label><select id="api-mode"><option value="openai">在线调用</option><option value="off">关闭（本地角色引擎）</option></select></div>
        <div class="setting-row"><label>Endpoint</label><input id="api-endpoint"></div>
        <div class="setting-row"><label>API Key</label><input id="api-key" type="password" placeholder="sk-..."></div>
        <div class="setting-row"><label>Model</label><input id="api-model"></div>
        <div class="setting-row"><label>温度</label><input id="api-temperature" type="number" min="0" max="2" step="0.1"></div>
        <div class="setting-row"><label>top_p</label><input id="api-top-p" type="number" min="0" max="1" step="0.05"></div>
        <div class="setting-row"><label>max_tokens</label><input id="api-max-tokens" type="number" min="1" max="8192"></div>
        <div class="setting-row"><label>presence_penalty</label><input id="api-presence-penalty" type="number" min="-2" max="2" step="0.1"></div>
        <div class="setting-row"><label>frequency_penalty</label><input id="api-frequency-penalty" type="number" min="-2" max="2" step="0.1"></div>
        <div class="setting-row"><label>stop</label><input id="api-stop" placeholder="多个用 | 分隔"></div>
        <div class="setting-row"><label>seed</label><input id="api-seed" type="number"></div>
        <div class="setting-row"><label>超时(ms)</label><input id="api-timeout" type="number" min="1000" step="500"></div>
        <div class="setting-row"><label>流式</label><div class="switch" id="stream-switch"></div></div>
        <div class="setting-row"><label>自动回复</label><div class="switch on" id="auto-reply-switch"></div></div>
        <div class="setting-row"><label>字体倍率</label><select id="font-scale"><option value="0.95">小</option><option value="1">标准</option><option value="1.1">大</option></select></div>
        <div class="setting-row"><label>成员API</label><select id="agent-target"><option value="global">全局默认</option><option value="阿泽">阿泽（情人）</option><option value="爸爸">爸爸</option><option value="妈妈">妈妈</option><option value="爷爷">爷爷</option><option value="奶奶">奶奶</option><option value="外公">外公</option><option value="外婆">外婆</option><option value="哥哥">哥哥</option></select></div>
        <div class="setting-row"><label>成员Endpoint</label><input id="agent-endpoint" placeholder="留空=跟随全局"></div>
        <div class="setting-row"><label>成员API Key</label><input id="agent-api-key" type="password" placeholder="留空=跟随全局"></div>
        <div class="setting-row"><label>成员Model</label><input id="agent-model" placeholder="留空=跟随全局"></div>
        <div class="setting-row"><label>系统提示词</label><textarea id="system-prompt"></textarea></div>
      </div>
      <div class="actions"><button class="btn primary" id="save-settings">保存设置</button><button class="btn" id="test-api">测试 API</button><button class="btn" id="normalize-endpoint">修正 Endpoint</button><button class="btn warn" id="reset-data">清空数据</button></div>
      <p class="tiny">本版不会出现“无回复无报错”：在线接口失败会提示原因并回退本地角色引擎。并且会自动清洗模型输出中重复的姓名前缀（如“阿泽：阿泽：...”）。</p>
    </main>
  </section>

  <div class="toast" id="toast"></div>
</div>

<script>
const STORAGE_KEY='wechat-selected-v2';
const RELATION_PROMPT=`你在扮演一套微信聊天角色系统。用户是女性“张雨”，请严格遵守：
1) 私聊对象是男性情人“阿泽”。语气亲密、自然，不要自称AI。
2) 家庭交流群成员：爸爸(张建国)、妈妈(李梅)、爷爷(张德福)、奶奶(王秀兰)、外公(李国华)、外婆(陈桂芳)、哥哥(张强)、用户本人(张雨)。
3) 群聊里每个成员是独立生命体，能根据群上下文发言；如果出现@某成员，优先由被@成员回答。
4) 禁止在回复前重复加名字前缀或引号（例如“阿泽：”“阿泽：阿泽：”等）。直接输出回复正文。`;

const DEFAULT_STATE={
  settings:{provider:'deepseek',apiMode:'openai',endpoint:'https://api.deepseek.com/chat/completions',apiKey:'',model:'deepseek-chat',temperature:0.7,topP:1,maxTokens:1024,presencePenalty:0,frequencyPenalty:0,stop:'',seed:'',timeoutMs:25000,stream:false,autoReply:true,fontScale:'1',systemPrompt:RELATION_PROMPT,agentConfigs:{}},
  chats:[
    {id:1,type:'lover',name:'阿泽❤️',unread:2,time:'11:18',preview:'今天会见我吗？',members:['阿泽'],messages:[{sender:'阿泽',text:'今天会见我吗？我想你了。'},{sender:'me',text:'要见，晚点去找你。'}]},
    {id:2,type:'family',name:'家庭交流群',unread:4,time:'09:46',preview:'@张雨 今天回家吃饭吗？',members:['爸爸','妈妈','爷爷','奶奶','外公','外婆','哥哥','张雨'],messages:[{sender:'妈妈',text:'@张雨 今天回家吃饭吗？'},{sender:'哥哥',text:'别再忙到太晚了。'}]}
  ],
  memories:{爸爸:'',妈妈:'',爷爷:'',奶奶:'',外公:'',外婆:'',哥哥:'',阿泽:''}
};

const state=loadState();let activeChatId=null;
function loadState(){try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');return s?{...DEFAULT_STATE,...s,settings:{...DEFAULT_STATE.settings,...(s.settings||{})},memories:{...DEFAULT_STATE.memories,...(s.memories||{})}}:structuredClone(DEFAULT_STATE)}catch{return structuredClone(DEFAULT_STATE)}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
function avatarData(name){const colors=['#4f8df8','#09c15e','#f39c12','#8e44ad','#1abc9c','#e67e22'];const c=colors[name.charCodeAt(0)%colors.length];const t=encodeURIComponent(name.slice(0,1));return`data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><rect width='100%25' height='100%25' fill='${c}'/><text x='50%25' y='58%25' text-anchor='middle' fill='white' font-size='56'>${t}</text></svg>`}
function esc(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function nowHM(){const d=new Date();return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}

function normalizeEndpoint(url,provider){let u=(url||'').trim();if(!u)u=provider==='openai'?'https://api.openai.com/v1/chat/completions':'https://api.deepseek.com/chat/completions';if(!/^https?:\/\//.test(u))u='https://'+u;
if(provider==='deepseek'){if(/^https:\/\/api\.deepseek\.com\/?$/.test(u))u='https://api.deepseek.com/chat/completions';if(u.endsWith('/v1'))u+='/chat/completions';if(!u.includes('/chat/completions'))u=u.replace(/\/$/,'')+'/chat/completions';}
if(provider==='openai'){if(/^https:\/\/api\.openai\.com\/?$/.test(u))u='https://api.openai.com/v1/chat/completions';if(u.endsWith('/v1'))u+='/chat/completions';if(!u.includes('/chat/completions'))u=u.replace(/\/$/,'')+'/v1/chat/completions';}
return u;}

function cleanModelReply(raw, speaker){
  let t=(raw||'').trim();
  for(let i=0;i<6;i++){
    t=t.replace(/^\s*["“”']?\s*([\u4e00-\u9fa5A-Za-z0-9]{1,8})\s*[：:,-]\s*/,'');
  }
  const sp=speaker.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const reg=new RegExp(`^(?:${sp}\s*[：:]\s*)+`,'i');
  t=t.replace(reg,'').trim();
  t=t.replace(/^["“”']+|["“”']+$/g,'').trim();
  return t||'我在。';
}

function getAgentConfig(name){
  const cfg=(state.settings.agentConfigs||{})[name]||{};
  return {
    endpoint: cfg.endpoint || state.settings.endpoint,
    apiKey: cfg.apiKey || state.settings.apiKey,
    model: cfg.model || state.settings.model,
    provider: state.settings.provider
  };
}

function renderChats(){const kw=document.getElementById('chat-search').value.trim();const list=state.chats.filter(c=>!kw||c.name.includes(kw)||c.preview.includes(kw));document.getElementById('chat-list').innerHTML=list.map(c=>`<li class='item' data-chat-id='${c.id}'><div class='avatar'><img src='${avatarData(c.name)}'></div><div class='meta'><div class='row'><div class='name'>${esc(c.name)}</div><div class='time'>${c.time}</div></div><div class='preview'>${esc(c.preview)}</div></div>${c.unread?`<span class='badge'>${c.unread}</span>`:''}</li>`).join('');document.getElementById('unread-total').textContent=state.chats.reduce((n,c)=>n+c.unread,0)}
function openPage(page){const safe=['chats','contacts','discover','me'].includes(page)?page:'chats';document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id===`page-${safe}`));document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.page===safe));history.replaceState(null,'',`#/${safe}`)}
function findChat(id){return state.chats.find(c=>c.id===id)}

function renderMessages(chat){const box=document.getElementById('message-list');box.innerHTML=chat.messages.map(m=>{const isMe=m.sender==='me'||m.sender==='张雨';const sender= isMe ? '' : `<div class='sender'>${esc(m.sender)}</div>`;return `<div class='msg ${isMe?'me':'col'}'>${sender}<div style='display:flex;gap:8px;${isMe?'justify-content:flex-end':''};width:100%'>${isMe?'':`<div class='avatar' style='width:36px;height:36px'><img src='${avatarData(m.sender)}'></div>`}<div class='bubble'>${esc(m.text)}</div></div></div>`}).join('');box.scrollTop=box.scrollHeight}

function openChat(id){const c=findChat(id);if(!c)return;activeChatId=id;c.unread=0;document.getElementById('chat-title').textContent=c.name;document.getElementById('chat-overlay').classList.add('active');renderMessages(c);renderChats();saveState()}
function closeChat(){activeChatId=null;document.getElementById('chat-overlay').classList.remove('active')}

function pickMentionTarget(text,chat){const m=(text.match(/@([\u4e00-\u9fa5A-Za-z0-9]+)/)||[])[1];if(!m||chat.type!=='family')return null;const map={爸:'爸爸',妈:'妈妈',爷:'爷爷',奶:'奶奶',外公:'外公',外婆:'外婆',哥:'哥哥',哥哥:'哥哥',爸爸:'爸爸',妈妈:'妈妈',爷爷:'爷爷',奶奶:'奶奶'};return map[m]||chat.members.find(x=>x.includes(m))||null}

function buildMessagesForAgent(chat,userText,agentName){
  const roleHint=chat.type==='lover'?'你是男性情人阿泽，和用户(女性张雨)私聊。':'你是家庭群成员'+agentName+'，只代表自己发言，不代替他人。';
  const memory=state.memories[agentName]||'';
  const history=chat.messages.slice(-16).map(m=>({role:(m.sender==='me'||m.sender==='张雨')?'user':'assistant',content:`${m.sender==='me'?'张雨':m.sender}：${m.text}`}));
  return [
    {role:'system',content:state.settings.systemPrompt||RELATION_PROMPT},
    {role:'system',content:roleHint},
    {role:'system',content:`你的个人记忆：${memory||'暂无。'}`},
    ...history,
    {role:'user',content:userText}
  ];
}

function localRoleReply(chat,userText,target){
  if(chat.type==='lover'){
    const lines=['我在，刚刚在忙，现在只想好好和你说话。','今天挺想你的，晚一点我们见面。','你说我都在听，别担心。'];
    return {sender:'阿泽',text:lines[Math.floor(Math.random()*lines.length)]};
  }
  const who=target||['爸爸','妈妈','爷爷','奶奶','外公','外婆','哥哥'][Math.floor(Math.random()*7)];
  const dic={爸爸:'你先把自己照顾好，其他事慢慢来。',妈妈:'记得按时吃饭，别空着肚子。',爷爷:'有空回家坐坐，家里都惦记你。',奶奶:'最近天凉，出门多加件衣服。',外公:'别总熬夜，身体最重要。',外婆:'看到消息回一句，大家安心。',哥哥:'行了，先把你那边安排好。'};
  return {sender:who,text:dic[who]||'收到。'};
}

async function requestApiReply(chat,userText,agentName){
  const s=state.settings;const agent=getAgentConfig(agentName);
  const endpoint=normalizeEndpoint(agent.endpoint,s.provider);
  const payload={model:agent.model,messages:buildMessagesForAgent(chat,userText,agentName),temperature:Number(s.temperature),top_p:Number(s.topP),max_tokens:Number(s.maxTokens),presence_penalty:Number(s.presencePenalty),frequency_penalty:Number(s.frequencyPenalty),stream:!!s.stream};
  if((s.stop||'').trim())payload.stop=s.stop.split('|').map(x=>x.trim()).filter(Boolean);
  if(s.seed!=='')payload.seed=Number(s.seed);
  const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),Number(s.timeoutMs)||25000);
  try{
    const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${agent.apiKey}`},body:JSON.stringify(payload),signal:controller.signal});
    if(!res.ok){const tx=await res.text();throw new Error(`HTTP ${res.status}: ${tx.slice(0,120)}`)}
    if(payload.stream){const reader=res.body?.getReader();if(!reader)throw new Error('流式响应不可读');const decoder=new TextDecoder();let buf='';while(true){const {done,value}=await reader.read();if(done)break;buf+=decoder.decode(value,{stream:true})}
      const lines=buf.split('\n').filter(l=>l.includes('data:'));let text='';for(const l of lines){const raw=l.replace(/^.*data:\s*/,'').trim();if(raw==='[DONE]')continue;try{const j=JSON.parse(raw);text+=j?.choices?.[0]?.delta?.content||''}catch{}}
      if(!text.trim())throw new Error('流式未返回文本');
      return cleanModelReply(text,agentName);
    }
    const data=await res.json();const out=data?.choices?.[0]?.message?.content?.trim();if(!out)throw new Error('API 返回为空');
    return cleanModelReply(out,agentName);
  } finally { clearTimeout(timer); }
}

function updateMemory(agentName,userText,replyText){
  const old=state.memories[agentName]||'';
  const chunk=`用户:${userText} | ${agentName}:${replyText}`;
  state.memories[agentName]=(old?old+' || ':'')+chunk;
  if(state.memories[agentName].length>400) state.memories[agentName]=state.memories[agentName].slice(-400);
}

async function replyByAgent(chat,userText,agentName){
  const s=state.settings;
  if(!s.autoReply) return null;
  const agentCfg=getAgentConfig(agentName);
  const canOnline=s.apiMode==='openai' && !!agentCfg.apiKey;
  if(canOnline){
    try{
      const text=await requestApiReply(chat,userText,agentName);
      updateMemory(agentName,userText,text);
      return {sender:agentName,text};
    }catch(err){toast(`API失败(${agentName})，回退本地：${err.message}`);const fb=localRoleReply(chat,userText,agentName);updateMemory(agentName,userText,fb.text);return fb;}
  }
  if(s.apiMode==='openai' && !agentCfg.apiKey) toast(`${agentName} 未配置API Key，使用本地引擎`);
  const fb=localRoleReply(chat,userText,agentName);updateMemory(agentName,userText,fb.text);return fb;
}

async function generateGroupReplies(chat,userText){
  const target=pickMentionTarget(userText,chat);
  const replies=[];
  if(target){
    const r=await replyByAgent(chat,userText,target);
    if(r) replies.push(r);
    return replies;
  }
  const members=['爸爸','妈妈','爷爷','奶奶','外公','外婆','哥哥'];
  const first=members[Math.floor(Math.random()*members.length)];
  const second=Math.random()<0.45?members.filter(x=>x!==first)[Math.floor(Math.random()*6)]:null;
  const r1=await replyByAgent(chat,userText,first); if(r1) replies.push(r1);
  if(second){const r2=await replyByAgent(chat,userText,second); if(r2) replies.push(r2);}
  return replies;
}

async function sendMessage(){const input=document.getElementById('msg-input');const text=input.value.trim();if(!text||!activeChatId)return;const chat=findChat(activeChatId);
  chat.messages.push({sender:'me',text});chat.preview=text;chat.time=nowHM();input.value='';renderMessages(chat);renderChats();saveState();
  let replies=[];
  if(chat.type==='lover'){const r=await replyByAgent(chat,text,'阿泽');if(r)replies=[r];}
  else{replies=await generateGroupReplies(chat,text);}
  if(!replies.length)return;
  for(const r of replies) chat.messages.push(r);
  const last=replies[replies.length-1];
  chat.preview=`${last.sender}：${last.text}`;chat.time=nowHM();
  renderMessages(chat);renderChats();saveState();
}

function applySettingsUI(){const s=state.settings;document.getElementById('provider').value=s.provider;document.getElementById('api-mode').value=s.apiMode;document.getElementById('api-endpoint').value=s.endpoint;document.getElementById('api-key').value=s.apiKey;document.getElementById('api-model').value=s.model;document.getElementById('api-temperature').value=s.temperature;document.getElementById('api-top-p').value=s.topP;document.getElementById('api-max-tokens').value=s.maxTokens;document.getElementById('api-presence-penalty').value=s.presencePenalty;document.getElementById('api-frequency-penalty').value=s.frequencyPenalty;document.getElementById('api-stop').value=s.stop;document.getElementById('api-seed').value=s.seed;document.getElementById('api-timeout').value=s.timeoutMs;document.getElementById('stream-switch').classList.toggle('on',!!s.stream);document.getElementById('auto-reply-switch').classList.toggle('on',!!s.autoReply);document.getElementById('font-scale').value=s.fontScale;document.getElementById('system-prompt').value=s.systemPrompt;document.documentElement.style.setProperty('--font-scale',s.fontScale||'1');applyAgentConfigUI()}

function applyAgentConfigUI(){
  const target=document.getElementById('agent-target').value;
  const cfg=(state.settings.agentConfigs||{})[target]||{};
  document.getElementById('agent-endpoint').value=cfg.endpoint||'';
  document.getElementById('agent-api-key').value=cfg.apiKey||'';
  document.getElementById('agent-model').value=cfg.model||'';
}

function saveSettingsFromForm(){const s=state.settings;s.provider=document.getElementById('provider').value;s.apiMode=document.getElementById('api-mode').value;s.endpoint=normalizeEndpoint(document.getElementById('api-endpoint').value,s.provider);s.apiKey=document.getElementById('api-key').value.trim();s.model=document.getElementById('api-model').value.trim();s.temperature=document.getElementById('api-temperature').value||0.7;s.topP=document.getElementById('api-top-p').value||1;s.maxTokens=document.getElementById('api-max-tokens').value||1024;s.presencePenalty=document.getElementById('api-presence-penalty').value||0;s.frequencyPenalty=document.getElementById('api-frequency-penalty').value||0;s.stop=document.getElementById('api-stop').value;s.seed=document.getElementById('api-seed').value;s.timeoutMs=document.getElementById('api-timeout').value||25000;s.stream=document.getElementById('stream-switch').classList.contains('on');s.autoReply=document.getElementById('auto-reply-switch').classList.contains('on');s.fontScale=document.getElementById('font-scale').value;s.systemPrompt=document.getElementById('system-prompt').value.trim()||RELATION_PROMPT;
  const target=document.getElementById('agent-target').value;
  const configs={...(s.agentConfigs||{})};
  if(target!=='global'){
    configs[target]={endpoint:document.getElementById('agent-endpoint').value.trim(),apiKey:document.getElementById('agent-api-key').value.trim(),model:document.getElementById('agent-model').value.trim()};
  }
  s.agentConfigs=configs;
  saveState();applySettingsUI()}

function bindEvents(){
  document.getElementById('tabbar').addEventListener('click',e=>{const t=e.target.closest('.tab');if(t)openPage(t.dataset.page)});
  document.getElementById('chat-list').addEventListener('click',e=>{const x=e.target.closest('[data-chat-id]');if(x)openChat(Number(x.dataset.chatId))});
  document.getElementById('chat-search').addEventListener('input',renderChats);
  document.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',()=>toast('功能已连接：'+el.textContent.trim())));
  document.getElementById('chat-back').addEventListener('click',closeChat);
  document.getElementById('send-btn').addEventListener('click',sendMessage);
  document.getElementById('msg-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendMessage()}});
  document.getElementById('chat-menu').addEventListener('click',()=>{const c=findChat(activeChatId);if(!c)return; if(c.type!=='family'){toast('私聊无需@成员');return;}document.getElementById('msg-input').value+='@妈妈 ';document.getElementById('msg-input').focus();});
  const openSettings=()=>document.getElementById('settings-overlay').classList.add('active');document.getElementById('open-settings').addEventListener('click',openSettings);document.getElementById('open-settings-top').addEventListener('click',openSettings);document.getElementById('settings-back').addEventListener('click',()=>document.getElementById('settings-overlay').classList.remove('active'));
  document.getElementById('stream-switch').addEventListener('click',e=>e.currentTarget.classList.toggle('on'));document.getElementById('auto-reply-switch').addEventListener('click',e=>e.currentTarget.classList.toggle('on'));
  document.getElementById('provider').addEventListener('change',e=>{const p=e.target.value;if(p==='deepseek'){document.getElementById('api-endpoint').value='https://api.deepseek.com/chat/completions';document.getElementById('api-model').value='deepseek-chat'}if(p==='openai'){document.getElementById('api-endpoint').value='https://api.openai.com/v1/chat/completions';if(!document.getElementById('api-model').value)document.getElementById('api-model').value='gpt-4o-mini'}toast('已应用提供商模板')});
  document.getElementById('agent-target').addEventListener('change',applyAgentConfigUI);
  document.getElementById('save-settings').addEventListener('click',()=>{saveSettingsFromForm();toast('设置已保存')});
  document.getElementById('normalize-endpoint').addEventListener('click',()=>{const p=document.getElementById('provider').value;document.getElementById('api-endpoint').value=normalizeEndpoint(document.getElementById('api-endpoint').value,p);toast('Endpoint 已修正')});
  document.getElementById('test-api').addEventListener('click',async()=>{saveSettingsFromForm();const c=findChat(1);try{const r=await requestApiReply(c,'请只回复：连接成功','阿泽');toast('测试成功：'+r.slice(0,20));}catch(err){toast('测试失败：'+err.message)}});
  document.getElementById('reset-data').addEventListener('click',()=>{localStorage.removeItem(STORAGE_KEY);location.reload()});
  document.getElementById('new-chat-btn').addEventListener('click',()=>toast('当前版本固定两个精选对话'));
  window.addEventListener('hashchange',()=>openPage((location.hash||'#/chats').replace('#/','')));
}

function boot(){applySettingsUI();renderChats();bindEvents();openPage((location.hash||'#/chats').replace('#/',''));toast('完整聊天系统已就绪')}
boot();
</script>
</body>
